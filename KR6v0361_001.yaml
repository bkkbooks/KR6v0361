body:
  text: 低三格者為原頌頂格者為講義大手印之名顯教雖亦有之然真正堪能大手印者則依薩迦大德貢迦爾將挫所云非經密乘第四灌頂所授之大手印不能稱為大手印甘波巴大師為廣事導引攝受弟子故説有二種於具普通根性者令由菩提道次第漸次趣入大手印此謂由中論等學而漸入者謂之實住大手印於較勝上根性者令依密法得受灌頂修習氣脈明點六法等道以了達取證於本覺智契合於大手印然此二者尚非上上最上之大手印則並亦無須乎灌頂等修但當恭敬禮拜承事親近於其上師或僅觀於上師微妙身相即能立得證悟如此由於無上恭敬順信之心力以依止於上師更不假外物言詮而能究竟了悟以證取之大手印方是大手印之最勝義心傳也以故上師觀察弟子根機成熟一鳴指間令其通達法爾彼所通達即是真正之大手印如口訣云不修不整不散亂者即真正之大手印之最上法門也此則不必如中論等宗依多門觀察而始得之蓋真正大手印非觀察故彼多門觀之中論等道原非上上大手印也須知上師者本已具是無上加持力得其無上加持不假方便修整等立即證得真實法爾真實法爾即是真正大手印彼多方觀察者為班智達派之方法無修而修者為古薩里派之方法班智達梵語意云大師班智達派謂講習派古薩里梵語意謂行乞古薩里派謂實修派以上為中論宗等與真正大手印之最大區別也又西藏大多數之中觀見宗其究竟亦不過觀求一切法之體性真實空義此心之體性自亦當然在所觀察之內今則我修我之心體本妙明淨既為本妙明淨更何所觀其為有為無空與不空乎是故一聲呸際萬緣放下但即保持本妙明淨之常照體性自不應更有何者之分別觀察是故大手印及大圓滿勝會兩法門實乃最極殊勝之以心修心上上法門也祝拔宗之大手印四瑜伽乃為循序專修於大手印者所説此一呼呸聲萬緣放下時僅惟一念不落散亂不落昏沉與無記為最勝上但如未能如是常保明照之體者又當依彼四瑜伽等方便而修行要當須知彼四瑜伽等亦皆方便原非大手印之真實處也梵文名嘛哈大穆德囉印烏巴得夏口訣藏文名大手印口授四種語中梵為天語故凡由天竺傳譯入藏土之佛典類皆首標梵稱用示尊崇之意其藏文譯名中於大印中加入手字者此在藏文手字為尊重佛典意此手字為尊稱佛之手表佛之如所有盡所有及二無分別空樂智慧印者亦表佛之二無分別智此智最上最要且最密猶如印符又如印契謂一切輪回涅槃之法無不一一契合於佛之如如妙智更無一法能逾越此智以外者大者簡小而言口訣即口授者謂言簡意賅且涵深理且便口誦心記也敬禮金剛空行金剛空行母即亥母為一切密宗之主體一切口授之庫主恆河大手印句句皆為口授故先敬禮之有四義除障加持令造作圓滿為利衆生為善因回向衆生令皆同證大手印也金剛之甚深義亦表佛之無二空智凡夫之俱生我執須金剛智慧方可斷除人若得金剛智慧則一切異熟空盡無餘金剛三摩地能壞滅一切煩惱業惑而無餘又金剛者有七義堅固精要真實不空不能斷截不能破裂不可剖分無可損壞是為金剛之七殊勝義故常以金剛喻佛之三身四身等能具四身如金剛而為一切所不能壞之三業則成為金剛大持之佛體矣今此恆河大手印口授之法實為一切金剛所趣由之道或乘所謂金剛乘者是也又如稱身為金剛身者以其具足如上述金剛七義之一切功德成就佛之四身及力故又如稱金剛壇城等亦皆以其具上述金剛七勝義故空為諸法之實性行非普通行蘊之行乃為般若之智行般若之智行常住於法性亦常運行不息故合言空行此為勝義諦説若以行表常飛行於空中則是俗義諦説空行有男女或稱父母男者又稱為勇父女者又稱為勇母此中但云空行意即指空行母略去母字者藏文續部中之通例也大手印法雖無表然於上師具苦行具忍具慧那喏者具種修心如是行此頌是諦洛巴祖稱謂那喏巴祖而啓教口授之首頌謂大手印法雖本無可表示然若汝那喏巴對於吾諦洛巴上師已具足種種苦行難行忍且具足智慧實為具諸堪能種性之弟子今且口授汝修心之要應如是行之也大手印有言聲文字之能詮及其所詮根道果三者所謂根大手印者即一切衆生之本心體性與佛無別平等平等元本清淨常住雖忽然不覺而起無明然其真心體性仍自明淨縱在六道輪回終仍不增不減此妙明淨性之本體有時稱之為本覺如來普賢如來本清淨見等等名異實同此即一心即根本大手印也舊派有説以此普賢如來為元始佛根元義無庸積集資糧淨除業障同於無須頭上安頭之意如彼海水因風掀動而生波浪若更加以攪動則更無寧息澄清之時又如空中雲霧雖起空中雲霧散去空性仍在毫未減損若吾人之心本無明淨之體性者則以任何方便不能淨之以心本具妙明淨體故斯可以方便拂去背覺合塵之妄念而得背塵合覺以成佛也所謂道大手印者恭敬信順於上師而得聞於法由聞而如理思維得決定之正知見又如理修行之是即道大手印也由聞思修之結果一旦豁然究竟通達證得本覺妙智時是即果大手印又根本之大手印超乎思量言説非凡夫之分別妄心所能了知非凡夫之言説所能宣説故至於弟子於上師必善依止者有三義依止為因依止為緣依止為加持云何因謂依止於上師得聞於不修不整不散亂之最勝口訣遂依教修持此三決定要義即是成就之勝因云何緣謂以依止故得具足一切懺墮集資之勝緣云何加持謂以依止上師得口訣之勝因及懺集之勝緣恆常不斷精進以行持自能憑仗上師無上加持力忽然於一剎那通達實際本元之根本大手印而得現證有如啞子食糖不可言表之境地是即依止為成就之加持義也真欲得此加持者最要於所依止之上師具至極之淨信心恭順心昔西藏大德當巴桑結有弟子求其加持即示之云汝必具至極之淨信與恭順心而後可是故於大手印道欲得加持者最極首要對於上師具淨信與恭順之心則諸佛如來即現上師之相為之加持譬如欲從日光中取火者則依火鏡火鏡即弟子之信順心能生加持之火以燒滅二障而得成就也那喏巴祖在印度為六大善巧門已得成就者之一降伏外道於佛教性相二宗研究甚精但於靜坐心不能寧乃遍尋求安心法門欲專依止成就大德聞諦洛巴祖之名日日尋訪一日至僧伽道場忽見諦祖作瘋狂狀在烤火房中即甚奇之以為必諦祖時諦祖示現神通以火燒魚而食一鳴指間吐魚復活又一鳴指間魚騰空而去那祖大敬之雖他僧謂為瘋狂無義而己獨於諦洛巴祖前具至極無比最大之淨信敬順心且具不可思議之苦行難行如傳所述小大之死難凡草四次今但舉其一次一日者師徒二人同處於高大房屋之頂端諦祖忽自語曰若有弟子於其上師真具信順者當躍此屋下那祖聞言都無猶疑一躍而下肢節俱碎幾死而諦祖徐下呼詢曰痛乎那祖曰甚痛諦祖即以手撫之體還如故譬如虛空無所依大手印亦無依境住於任運境界中定從繫縛證解脫此下正示以種種修心口訣多以譬喻為説此頌以虛空為喻謂如彼虛空體性無際無所可依而此大手印之體性本自空寂亦無所可依處故惟有於此本妙明淨之一心離一切戲論及修整任運寬坦而安住則決定能從無始無明二障繫縛上得其解脫自在也將此心頓然放下明性即自現前剎那妄念生起剎那慧火燒除之此心及妄念同時解脫故應知生滅心之妄念與非生滅心之明性本來體無有二如海水之波夏天之雷起本無起滅本無滅然若未能通達任運則仍當依白蓮大師所著大手印法要中前二步之方便以修之至尊米拉熱巴示云不整治以為修者要須達乎三事者煩惱及妄念不整治者則墮落者樂明無念不整治則流轉三界者本心則不許整治此則示人以未可誤會為毫不修整之理謂修真正大手印者於原離善惡之本明心性固不得分別修整此如山瀑流下清濁自分或怒流急湍自激自平樂明無念者即是一道清淨照寂而明定但若煩惱妄念熾盛生發時又必猛提正念厲聲一呸束使還淨若為束之過緊亦以一呼呸聲令妄住於本明體上如是者不惟不致為煩惱妄念所牽而墮落且使之成為助道之勝緣至於樂受過甚者亦必以一呼呸聲令明得顯無念不是無記更當別於外凡斯可免流三界其第三者本心不許整治則為無以上諸病而得善住於自心明體者自當無任何之修整令得任運通達證入本覺智境焉又貢師他時口示云樂明無念三事當等持樂特甚趣欲界明特甚趣色界無念特甚趣無色界此即樂明無念亦非可不有整治之要訓也又解此頌首句虛空無可依之依字有指示言詮義次句大手印亦無依之依字有依之作修義由是吾人雖常言虛空虛空而真實之虛空體性則離於指示與言詮所能表狀者同理大手印之真實體性既已超乎思量言詮説境則所謂修持於大手印者之修處實同虛空而亦無有可指示言詮者是即所謂無修而修第三句住於任運境界中即是無修而修謂如乳足嬰孩任運寬坦而入睡則任何纏覆悉歸於法爾界中任何繫縛決定解脫薩囉哈大師云若能決定了達此心體性同於虛空無可方物則亦能知修者實無何可修而一切妄念本自無有又如此自心之實際體性上勿起整治之作意於善惡念興起時決不以愛憎心相應而著之及以整治作意重為其染污增上緣則此自心即得任運安定於其本妙明淨境心不整治則自明水不攪動則自澄此則尤為甚深之要義也譬如以眼觀察虛空無所見如是以自心觀本淨妙明心一切邪妄分別消除證覺地譬如空中雲霧散本無住者及去者分別識浪生於心觀心本淨浪自滅譬如空離一切色黑白等色不能染妙明心亦離諸色善惡白黑不能染譬如晴明日光照千劫黑暗頓開朗本淨妙心放光明多劫輪回業障消上段一頌已以虛空喻説心之本體性今再以三頌仍就虛空表喻心之相與用初者吾人於明淨晴空中惟見炳炳長空都無一物此喻人若能觀得自性之本妙明淨心時其中原無一切妄惑顛倒是即見性成佛也次者空中有時現有雲霧而此雲霧何來則緣乎地氣地氣所緣皆無非因緣所生之法其自性本空假有實無當其生起不可計執其住及其散時不可計執其去依乎心起之妄念亦復如是妄念何由生無非緣於種種情物為其對象而此為對象之情物又何一而非本無自性之因緣所生法乎不惟倏起倏滅之妄念無自性即此當前心念能起所起能滅所滅皆無自性且無一而能越於本明心體之外達乎此則立即可於本明心體任運寬坦而定其妄境妄念如心識之波浪者自亦頓滅矣第三頌以虛空喻心明其原不受任何之色染所謂一切色者此中但指形色與顯色形色為大小長短方圓等顯色為藍緑紅黃黑白諸種色吾人見此界之天空當其明淨時惟覺其呈現一種所謂天藍色者則因如對法論所云此一天下須彌山南皆為吠琉璃色所映顯即此天青之藍色實則虛空者不惟不可言其具何形色並且不可執計其具何顯色縱於在某種因緣生起時假現何色但真空固無任何之色相假有之色自未嘗集污此虛空如是善惡之白黑等業實皆不能染污此心之真實體相與此正同此心之如來藏性如如常住在凡未減在聖未增即是此理此開首諸頌何以多引虛空為喻則以此心本體即是虛空之體凡所有一切之色法心法心所法皆為所包攝而無餘三界唯心萬法唯識又空生此心中如海一漚發生死涅槃法亦不外此一心故金剛歌詠引薩囉哈大師之頌曰此心體性應求得此如意寶我敬禮彼中釋云唯此心體為一切諸法之種子由心種子現起生死涅槃一切法明了此種現之法者可得解脫不明了者沉淪三有也復次如日光明能破黑暗無論何處曾多經年劫之黑暗但得日光一照立即開明且其光明雖有時為雲霧掩遮其明體固常在也同理此心本妙明淨本具本覺智光縱屬無始劫來在迷衆生流轉生死輪回六道隨業浮沉其本覺智光常存未失不過有如雲掩日光一旦雲散天開則朗朗輝輝大千炳耀此則猶如由不覺而始覺始覺即同本覺生出子光明而合母光明也虛空言説強安立虛空究竟離言詮覺心雖亦強言釋究竟成就實離言要知心性本同空無餘攝盡一切法身離諸作要間住語離塵聲空谷音意離思量比對法如竹中空持此身心合超絶言思空安住任運無取捨無著心契大手印恆修決證正菩提此無二於虛空之即此一心光明大手印者雖可如上少分而説其表喻又如大圓勝慧中擷要説為一切顯現諸法一剎那由自心圓現一剎那圓滿歸於自性等及大手印法常説輪回涅槃一切法一一未越於法性等等之名言安立但實際超絶言思如入中論所謂一切法性應離常斷等戲論分別實無名言可立可説又虛空者依世諦言尚復可言其為真實堅固不壞及離一切抉擇等但究竟欲令指示此之實相實亦不可得也龍樹菩薩讚心頌曰諸佛出生處墮地獄未減成佛原未增應敬禮此心故如虛空攝盡一切法此如來藏心攝具一切聖凡種子而為衆生所畢具雖然如是金砂雖具金質未即成金必經煉冶工夫行人雖立見宗自非不修能證故此段后八句二頌即是示三門之修法也初身修者頌云離諸作意謂世間非利益諸作悉捨離外即他種出世行法亦當離去而唯安間寬坦令身安住次語修者無利樂之世間語應禁之乃至呪誦亦宜休止安靜如谷三意修者則離一切戲論思量比對之心想外即觀想作意亦宜休作恰恰用心時恰恰無心用令今此身上自頭頂下至足底同於中空之一竹筒然心等虛空超絶一切之分別又令等持離一切掉舉昏沉與無記惺惺寂寂靈靈明明無取無捨無著之心即此而定住於本妙明淨之體性中即是大手印定如是恆常修持之者決得忽焉剎那如暗室燈燃光明開朗無上之涅槃自性俱生本覺之智慧光明全體畢現而無上正覺之道立時證矣密呪典及波羅蜜種種經律與法藏各各論義宗派等皆非光明大手印由生分別障明印反失所守三昧耶永離分別不著意自生自滅如水波若順無住無緣諦即守破暗三昧耶若離分別無所住一切法藏無餘見若依此義脫輪回並能燒除諸罪障此是教內大明燈不修此義愚夫輩彼常漂溺生死流未出穢苦之愚夫應哀憫彼令依師得師加持而解脫吁嗟乎流轉輪回者毫無義利唯是苦有所作亦無義利觀心最殊勝凡諸密乘咒道次第以及修求諸到彼岸之法乃至繁多契經調伏性宗相宗諸多派別支分論教談理落於分別者皆非光明大手印也因其耽於多所分別即未免執著不獨顯教為然即在密宗生起圓滿諸般次第及修氣脈明點諸法若落分別執著非僅不見光明大手印且一有實執即為光明大手印之障礙不得顯現光明又以分別執著障光明大手印故以為守三昧耶而實為破壞三昧耶故惟永離分別總不如意如水生波自流自息又善了達於水上畫紋空中揮筆水與空痕云何尋迹之理及一切法本不可住本無可緣之勝諦心一起於分別即於知此分別為無實質自性以為修同樣一起於善即於知此善無自性一起於惡即於知此惡無自性乃至一切貪嗔等毒即於知其皆無自性以為修如是毒藥轉成醍醐煩惱即是菩提不起修整然又絶無散亂以守護自心能如是無住無緣任運而不違越自心明境本體者即是同於手執明燈照破黑暗即是善能守護三昧耶又分別執著豈惟違犯三昧耶直亦未為隨順於一切法教蘊故惟永離分別執著而無所住而生其心者方能見徹三藏一切教義真諦而無餘也如他頌有云離諸作意與實執亦無修氣縛自心自心無整如乳嬰隨自明體心作主妄念起觀其自性應知水波二無異離諸實執無住邊則見諸法蘊勝義是故初修業者應即修於無作之瑜伽此有四支專一離戲一味無作能離一切分別與邊際不住常斷一切之戲論唯依第一了義光明大手印之無作而得任運安住於自心本明淨體上者即可脫輪回之牢獄而契入菩提僅能一剎那而如是定者亦可燒盡無始所積之重罪若能徹底明見此本心體之妙明淨性即成佛道決無疑也故此光明大手印誠為教乘中第一殊勝了義之最大明燈其有未信者真愚人也愚夫無信而常恆不斷為生死輪回之漩渦所漂捲而不能出者有四因一無明二見此謂邪見三貪四愛有此四因故其沉淪生死常在穢染苦惱而不知出要是以諦洛巴祖師哀憫此輩且示大手印學者亦應發同體大悲之心見有如此愚人必當令其歸投依止於己善巧修證成就於光明大手印自心體性無分別勝智之大德上師由聞而思而修之尤為切要令其對師發起如佛即佛之敬信隨順心則上師之加持力可得入其身中一得加持力入於其身即如於掌中得觀安摩羅果本覺智之光明顯現而得解脫成就菩提矣此段末二長句總束以上諸義而更囑無作之修以觀心為要若離執計是見王若無散亂是修王若無作求是行王若無所住即證果越所緣境心體現無所住道即佛道無所修境即菩提嗟乎於世間法善了知無常法如夢如幻夢幻實義本無有知則當厭離於彼捨諸貪嗔輪回法依於山側洞穴居恆住無作任運境得大手印亦無得譬彼大樹枝分可萬千齊根倒斷萬千枝分萎斷心意根生死枝分亦全枯譬彼千劫所集暗得大明炬暗立遣如是自心剎那光多劫無明障頓除此下正示瑜伽行人修行之要訣瑜伽之道有四要門見修行果是也見必超離一切執著遍計方為真正見中之王修必自心明體毫不散亂方為真正修中之王行必安住於自心明體無著無求方為真正行中之王若言果道此必聖凡上下涅槃生死皆能無希求無所住真正無上之隨緣不變不變隨緣寂而恆照照而恆寂等同諸佛方是果也復次學道行人心馳緣觀真體不得露現必善巧於離觀而觀離緣而緣離修而修是為善巧觀修又必無住而住方為善住無逝而逝方為善逝無成而成方為圓成無證而證方為實證必如此者方是大圓滿菩提佛道也於是諦洛巴祖師又喟然嘆曰嗟乎世間法無常如夢復如幻本無實義諦悉是假名相智士應了知而生厭離心斷捨貪嗔等輪回苦因法往彼山岩洞離塵清淨修恆住無所作任運住本明證所本無證光明大手印譬如彼大樹枝分多無數斷其根倒地枝分齊謝萎斷心意妄根一切生死了縱令久昏暗一明諸暗消剎那本覺明照破多劫罪雖然如是其尤要者令身安住如須彌山令心寂淨澄清不為外境所牽隨處亦皆可修處安身不安處靜身不靜亦是徒然坐時睜目可閉目亦可若心未善安止則睜目非閉目亦非任運而住心無修整散亂無記不修整則又非是真能善巧安定身心而修者不住茅蓬亦可修行住茅蓬而不免於散亂亦無成也噫嘻有心之法不得離心義有為之法不得無為趣欲達真實離心無為勝義趣任運持心安住本明體分別垢水自當返澄清障修諸顯亦各自寂隱無取捨心光發而解脫了本無生無始習垢淨亡諸執計安住無生境凡所顯現即是自心法超脫邊執得殊勝見王超深廣量得殊勝修王離斷邊品得殊勝行王能無所住得最殊勝果引伸上段之義更示轉深之趣於是復喟然歎曰以有生滅心之法不能得到超離心境之義諦以有所作為之法不能得到無為法之旨趣若欲達到真實離心及無為之義趣者唯當任運持心令其安住本然而定於離一切纏覆之本妙明淨心體之上如是任令彼妄心分別如垢水者不加攪亂自得澄清對一切聲色等法似能顯生而障於道行者亦置不理會更不一毫有所愛憎取捨則如賊入空室自形寂隱如是無著之心昭昭靈靈一旦本淨明心曜然光曙解脫現前矣須知諸法之所顯現者唯此心能見其顯現者亦唯此心究此能見所見體無有二唯一空寂本自不生是即顯空色空明空等雙融無二之本覺智慧光明大手印道此而證得之時即是如來之身相而一切無始以來業習垢染一洗而空也故頌中接云亡諸執計之心安住於本自無生之境何以故凡所顯現能見所見原此一心之法既了知其本自空寂而無生則計善計惡計是計非或愛或憎或取或捨豈非以妄逐妄如水已不清更從而攪亂之則永不能澄定乎是故要在明乎此理不修不整無取無捨心體妙明方能顯發也故頌又接云能如是超脫一切邊見計執者即得殊勝見之王是為見之最要口訣修持者亦須毫無計執如根本智後得智真實修非真實修乃至此法彼法或深廣或非深廣及他一切等量之計執前曾云若無散亂是修王今再轉深示以越深廣量等方為殊勝修之王蓋必如此方能無散亂也復次前頌示云若無作求是行王今則轉深示令離斷邊品方得殊勝之行王離斷滅邊見品等方是無作求之正義否則又恐行人誤落偏空涅槃邊無所住道是佛道前頌亦已言之今頌進云能無所住得最殊勝果則前頌為開示要門今則進示深入此要門以至究竟得果證之地故當與前頌合參之而善得祖師慈悲之至恩意也行者初得覺受如瀑流中如恆河暢流而間緩後如平水子母光明會劣慧異生未堪善安住可於明點氣脈諸要門以多支分方便攝持心調令任運安住於明體若依業印增現空樂明須知加持雙運之福智導自頂輪緩降不可泄漸提令遍全身一切輪絶離貪故空樂明方顯長命黑髮相飽如滿月光彩煥發力大如獅子願共速得安住勝成故此大手印極心要口訣且堪能種衆生恆受持上來已詳示最殊勝之見修行果然為非上上根器之行者開示入道方便則有如此段之三種第一種為善慧根器行人之方便即此中第一頌三句所言之三步行者初修業時每有妄念紛騰如瀑流之覺受相或較未修業時反多者此為開始認識其前所不自察之妄念故當先修立斷法繼調之以縱念法如祝拔宗之大手印法善修業者過此階段趨入第二步時自能進而覺受其心念有如恆河暢流之水視瀑流之倒瀉急湍為緩和間暇多矣但仍不免波浪起伏思潮動蕩此則正當善巧實修於上述種種口訣之法善巧精進修持者過此即能達到風平浪靜水面如鏡之境此時仍如上訣而善巧修持者不久發放其子光明與母光明會合為一即得證矣如上修持以其要在無著無緣無求無作而唯任運安住於本明淨妙故亦不固定時緣處緣及事境等行住坐臥皆可修持然有劣慧根器未可於無緣無作等而善安住者則可依於此段第二頌四句所示之法或緣木石佛像乃至金剛頌持瓶氣觀明點等法以作修持令心得專一安止而顯生契入本覺智之光明若為特具堪能之異生為合增長其覺受暖相空樂等則可依於業印此之方便即欲樂定諸大德開示多云欲樂定重在氣功人之揀擇尤為嚴格多生過患不易修習且助長對治之法甚多非必從事於此乃能成佛至助長之大者莫如懺罪積資即所以集福淨障是又非勵力於修念金剛薩埵及上師合修法兩儀軌焉不為功也此根桑上師大圓滿禪定休息要門密記中之警誡貢師亦口示業印不及光明大手印殊勝穩妥故謹並附注於此此段後三頌即為此方便之略述此之業印者極難極險詳必另從師授此但略言梗概謂修者最要必如法加持方便智慧外內鈴杵各作本尊方堪雙修福慧尤必特具不失之堪能令菩提自頂下降降而無漏泄且必反提而上散布全身各輪各脈無一而稍舛失更必絶對非貪否則立墮能一毫無越而能修至空樂明現前者現世即可長延壽命面貌端嚴如滿月澤潤如良玉反老還童力大如獅子具得八種世間成就已漸得不久證於空樂明又此空樂明者即本覺智之異名也此大手印口授為無上成就諦洛巴祖師在恆河畔向其弟子已得善巧成就喀却班致達那諾巴白教第三代祖釋十二苦行之究竟而特面授者一名金剛大手印二十八頌書中未必每頌四句頌數亦不合草八但共一百一十二句天竺例以四句稱一頌故總之而言耳嗣為西藏大譯師人稱之為聲明王者馬爾巴大士白教四祖親承那祖之傳承並親承口授此頌已在將波哈哩地經那祖親示抉擇之下而譯為藏文中華民國第一戊寅夏仲之吉釋碧松補詳原頌文句觀化廬主整理聽講録於江陵有過求懺有善回向如母有情速趣勝上
